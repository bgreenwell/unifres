quartodoc:
  package: unifres
  title: Python Reference
  dir: reference_python

  sections:
    - title: Core Functions
      desc: Functions for computing and visualizing functional residuals.
      contents:
        - fresiduals
        - fredplot
        - ffplot
    - title: Utilities
      desc: Internal utility functions.
      contents:
        - utils.is_fitted
        - utils.unifend
        - utils.expand_endpoints

execute:
  freeze: false         # Disable freeze to ensure fresh output
  cache: true           # Cache results locally for faster re-rendering
  echo: true            # Show code in output
  output: true          # *** CRITICAL FIX: Enable output capture ***
  warning: false        # Suppress warnings in output
  message: false        # Suppress messages in output
  error: false          # Don't fail build on example errors
  daemon: false         # Don't use background daemon

project:
  type: website

website:
  title: "unifres: Unified Residuals"
  navbar:
    left:
      - href: index.qmd
        text: Home
      - text: Get Started
        menu:
          - href: installation.qmd
            text: Installation
          - href: quickstart.qmd
            text: Quick Start
      - text: Examples
        menu:
          - href: examples-r.qmd
            text: R Examples
          - href: examples-python.ipynb
            text: Python Examples
      - href: methodology.qmd
        text: Methodology
      - text: API Reference
        menu:
          - text: Python API
            href: reference_python/index.qmd
          - text: R API
            href: reference_r/index.qmd
      - href: contributing.qmd
        text: Contributing
    right:
      - icon: github
        href: https://github.com/bgreenwell/unifres
  sidebar:
    - title: "Get Started"
      contents:
        - installation.qmd
        - quickstart.qmd
    - title: "Examples"
      contents:
        - examples-r.qmd
        - examples-python.ipynb
    - title: "Documentation"
      contents:
        - methodology.qmd
        - contributing.qmd

format:
  html:
    theme: cosmo
    toc: true
    code-copy: true
    code-fold: false
    fig-width: 8
    fig-height: 5
    fig-format: png           # NEW: Explicit PNG format
    fig-dpi: 150              # NEW: Web-optimized resolution (use 300 for print)
    embed-resources: false    # NEW: Store figures separately for browser caching